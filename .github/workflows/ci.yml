# CI for the @modern-admin/* monorepo.
#
# Runs on every pull request and on pushes to main:
#
#   check — install → prisma generate → typecheck → lint → unit tests.
#           Unit tests are hermetic (Redis is faked, no Postgres needed),
#           so no services are provisioned for this job.
#
#   e2e   — full-stack Playwright suite. Postgres + Redis come from the
#           repo's docker-compose.yml (same containers as local dev), the
#           schema is pushed with `prisma db push` (no checked-in
#           migrations), and Playwright boots both dev servers itself
#           (see apps/e2e/playwright.config.ts webServer entries).

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The generated Prisma client is gitignored; typecheck needs it.
      # `prisma generate` never connects, so a dummy DATABASE_URL suffices
      # (prisma.config.ts resolves it eagerly via env()).
      - name: Generate Prisma client
        run: bun run --filter @modern-admin/app-api-prisma prisma:generate
        env:
          DATABASE_URL: postgresql://localhost/ci

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    env:
      # Matches the credentials in docker-compose.yml.
      DATABASE_URL: postgresql://admin:admin@127.0.0.1:5432/modern_admin?schema=public
      REDIS_URL: redis://localhost:6379
      # buildBetterAuth() refuses to boot without a strong secret (≥32 chars,
      # not the `replace-me` placeholder). CI runs against an ephemeral test
      # DB, so a fixed non-production value is fine here.
      BETTER_AUTH_SECRET: ci-e2e-better-auth-secret-0123456789abcdef
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --wait blocks until the postgres/redis healthchecks pass.
      - name: Start Postgres and Redis
        run: docker compose up -d --wait

      - name: Generate Prisma client
        run: bun run --filter @modern-admin/app-api-prisma prisma:generate

      # No migrations are checked in — sync the schema directly.
      - name: Push Prisma schema
        run: bun run --filter @modern-admin/app-api-prisma prisma:push

      # The api-prisma server wires ModernAdminStaticUiModule, whose middleware
      # reads `packages/web/dist/standalone/index.html` at bootstrap and throws
      # if it is missing. e2e drives the UI via the vite dev server, but the
      # api still needs the standalone shell present to boot, so build it.
      - name: Build web standalone shell
        run: bun run --filter @modern-admin/web build:standalone

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: apps/e2e

      - name: Run e2e tests
        run: bun run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
