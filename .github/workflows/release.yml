# GitHub Actions release workflow for the @modern-admin/* monorepo.
#
# On every push to main this workflow either:
#
#   (a) Opens / updates a "Version Packages" pull request — if there are
#       unreleased `.changeset/*.md` files staged on main.
#   (b) Publishes every publishable package — if there are NO pending
#       changesets (i.e. the Version Packages PR has just been merged).
#
# Authentication:
#   - GITHUB_TOKEN (auto-scoped) is used by changesets/action to open the
#     "Version Packages" PR and create GitHub releases.
#   - NPM_TOKEN (repo secret: an npm automation token for the `modern-admin`
#     npm org) is what `bun publish` uses to publish the public packages to
#     registry.npmjs.org. Create it at npmjs.com → Access Tokens →
#     Granular/Automation, scoped to the @modern-admin org, then add it as a
#     repository secret named NPM_TOKEN.
#
# Manual publish from a fork / local machine remains possible — see
# `.changeset/README.md`.

name: Release

on:
  push:
    branches: [main]

# Concurrency: queue releases per-branch so two pushes don't race.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to compute since-last-release diffs.
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Public npm (npmjs.org) auth for bun: write the token to a
      # project-local .npmrc so `bun publish` can hit registry.npmjs.org.
      # bun honours the same npm auth config. NPM_TOKEN is an npm automation
      # token (bypasses interactive 2FA in CI) for the `modern-admin` org.
      - name: Configure registry auth
        run: |
          cat > .npmrc <<EOF
          @modern-admin:registry=https://registry.npmjs.org
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Generate the Prisma client for app-api-prisma so its typecheck can
      # resolve `./generated/prisma/client`. The schema is checked in but
      # the generated client is not (`src/generated/` is gitignored).
      # prisma.config.ts eagerly resolves DATABASE_URL via Prisma's env()
      # helper — pass a dummy URL so the config loads. `prisma generate`
      # never connects to the database, so the value doesn't matter.
      - name: Generate Prisma client
        run: bun run --filter @modern-admin/app-api-prisma prisma:generate
        env:
          DATABASE_URL: postgresql://localhost/ci

      - name: Typecheck
        run: bun run typecheck

      - name: Build all publishable packages
        # Build only the packages that will actually be published (packages/*).
        # Apps are private and not published, so a path filter keeps the build
        # scoped to the publishable workspace packages.
        run: bun run --filter './packages/*' build

      # Path A: stage changeset bumps in a PR if any pending changesets exist.
      # Path B: publish if no pending changesets (PR was just merged).
      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When pending changesets exist, this opens the "Version Packages"
          # PR via `bun run version-packages`.
          version: bun run version-packages
          # When no pending changesets exist, this triggers publication.
          publish: bun run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          # changesets/action uses GITHUB_TOKEN for the PR / release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # bun publish reads NPM_TOKEN / BUN_AUTH_TOKEN — point both at the
          # npmjs automation token so publication targets registry.npmjs.org.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
